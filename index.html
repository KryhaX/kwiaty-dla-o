<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Oliwki <3</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            /* Czarne tło sprawi, że tło obrazka wtopi się w stronę */
            background-color: #000; 
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
        }

        .scene {
            position: relative;
            width: 320px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Przycisk */
        #open-btn {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            padding: 15px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            background-color: #ff3366;
            color: white;
            border: 4px solid #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0px #fff;
        }
        
        #open-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: #ff4d88;
        }

        /* Pudełko prezentowe */
        .gift-box {
            position: absolute;
            bottom: 40px;
            width: 160px;
            height: 140px;
            z-index: 10;
        }

        .box-back, .box-front {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            border: 4px solid #fff;
            box-sizing: border-box;
        }

        .box-back {
            background-color: #b0154a; /* Ciemniejszy tył dla głębi */
            z-index: 1;
        }

        .box-front {
            background-color: #ff4d88; /* Jaśniejszy przód */
            z-index: 10;
        }

        /* Pokrywka */
        .box-lid {
            position: absolute;
            bottom: 130px; 
            left: -10px;
            width: 180px;
            height: 40px;
            background-color: #ff4d88;
            border: 4px solid #fff;
            z-index: 15;
            box-sizing: border-box;
            transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: bottom right;
        }

        /* Wstążki na pudełku */
        .ribbon-vertical {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 100%;
            background-color: #ffd700;
            border-left: 4px solid #fff;
            border-right: 4px solid #fff;
            box-sizing: border-box;
        }

        .box-lid .ribbon-vertical {
            height: 100%;
        }

        .ribbon-horizontal {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            height: 30px;
            background-color: #ffd700;
            border-top: 4px solid #fff;
            border-bottom: 4px solid #fff;
            box-sizing: border-box;
        }

        /* Wygenerowany Bukiet */
        .bouquet {
            position: absolute;
            bottom: 40px;
            left: 50%;
            /* Na start malutki i schowany głęboko w pudełku */
            transform: translateX(-50%) scale(0.2) translateY(200px);
            width: 450px; 
            z-index: 5; /* Wyskakuje spomiędzy tyłu a przodu pudełka */
            opacity: 0;
            transition: all 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Ten trik sprawia, że czarne tło obrazka staje się przezroczyste! */
            mix-blend-mode: screen; 
            pointer-events: none;
        }

        /* Tekst "Dla Oliwki <3" */
        #text {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            color: #ffb3c6;
            text-shadow: 3px 3px 0px #ff0055;
            opacity: 0;
            z-index: 20;
            transition: opacity 2s ease-in-out;
            line-height: 1.8;
        }

        .heart {
            color: #ff0055;
            display: inline-block;
            animation: heartbeat 1s infinite;
        }

        /* ======= ANIMACJE PO KLIKNIĘCIU ======= */
        
        /* Odskakująca pokrywka */
        .gift-box.open .box-lid {
            transform: translateY(-100px) rotate(35deg) translateX(120px);
            opacity: 0;
        }

        /* Wyskakujący bukiet */
        .gift-box.open .bouquet {
            transform: translateX(-50%) scale(1.1) translateY(-120px);
            opacity: 1;
        }

        .text-visible {
            opacity: 1 !important;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.3); }
        }
    </style>
</head>
<body>

    <div class="scene">
        <button id="open-btn">Otwórz mnie</button>
        <h1 id="text">Dla Oliwki <br><br><span class="heart">&lt;3</span></h1>
        
        <div class="gift-box" id="gift-box">
            <!-- Tylna ścianka -->
            <div class="box-back"></div>
            
            <!-- Obrazek bukietu -->
            <img src="bukiet.png" class="bouquet" id="bouquet" alt="Bukiet">
            
            <!-- Przednia ścianka ze wstążką -->
            <div class="box-front">
                <div class="ribbon-vertical"></div>
                <div class="ribbon-horizontal"></div>
            </div>
            
            <!-- Pokrywka -->
            <div class="box-lid" id="box-lid">
                <div class="ribbon-vertical"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('open-btn').addEventListener('click', function() {
            // Znika przycisk "Otwórz mnie"
            this.style.opacity = '0';
            this.style.pointerEvents = 'none';
            
            // Otwiera pudełko
            setTimeout(() => {
                document.getElementById('gift-box').classList.add('open');
            }, 200);
            
            // Pokazuje dedykację z opóźnieniem
            setTimeout(() => {
                document.getElementById('text').classList.add('text-visible');
            }, 1800);
        });
    </script>
</body>
</html>
